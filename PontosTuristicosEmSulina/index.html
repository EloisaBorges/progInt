<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Sulina - PR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Sulina - PR</a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu" aria-label="Abrir menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#turismo">Turismo</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contato">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="bannerSulina" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="sulina.jpg" class="d-block w-100 carousel-img" alt="Sulina">
            </div>
            <div class="carousel-item">
                <img src="thermassulina.jpg" class="d-block w-100 carousel-img" alt="Thermas">
            </div>
            <div class="carousel-item">
                <img src="rota_das_cachoeiras.jpg" class="d-block w-100 carousel-img" alt="Cachoeiras">
            </div>
            <div class="carousel-item">
                <img src="praca_municipal_2.jpg" class="d-block w-100 carousel-img" alt="Praça">
            </div>
        </div>
        <button type="button" class="carousel-control-prev" data-bs-target="#bannerSulina" data-bs-slide="prev" aria-label="Anterior">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button type="button" class="carousel-control-next" data-bs-target="#bannerSulina" data-bs-slide="next" aria-label="Próximo">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="container my-5" id="turismo">
        <div class="row g-4">
            
            <div class="col-md-6">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold text-success">Pontos Turísticos</h5>
                        <p class="card-text">Explore a cidade!</p>
                        <button type="button" class="btn btn-success px-4 shadow-sm">Ver Detalhes</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h5 class="mb-3 fw-bold">Destaques</h5>
                <div class="list-group shadow-sm">
                    <span class="list-group-item active bg-success border-success fw-bold">O que fazer:</span>
                    <a href="#" class="list-group-item list-group-item-action">Explorar as Cachoeiras</a>
                    <a href="#" class="list-group-item list-group-item-action">Visitar Thermas de Sulina</a>
                    <a href="#" class="list-group-item list-group-item-action">Conhecer a praça da cidade</a>
                </div>
            </div>

        </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
