<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Sulina - PR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Sulina-PR</a>
        </div>

    <div class="caixa">

                    <div class="carousel-item active">
                        <img src="https://via.placeholder.com/600x300?text=Aguas+Termais" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="https://via.placeholder.com/600x300?text=Rio+Chopim" class="d-block w-100">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="caixa">

            <h2>📍 Pontos Turísticos</h2>
            <div class="row g-3">
                <div class="col-12">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5 class="card-title text-dark">Termas de Sulina</h5>
                            <p class="card-text">Águas relaxantes e medicinais.</p>
                            <button class="btn btn-dark btn-sm">Ver Mais</button>
